name: Benchmark CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test-benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            global.json
            NuGet.Config
            Directory.Build.props
            GlyphToon.Benchmark.slnx
            GlyphToon.Benchmark/GlyphToon.Benchmark.csproj
            GlyphToon.Benchmark.Tests/GlyphToon.Benchmark.Tests.csproj

      - name: Restore
        env:
          GLYPHTOON_GITHUB_USERNAME: ${{ secrets.GLYPHTOON_GITHUB_USERNAME != '' && secrets.GLYPHTOON_GITHUB_USERNAME || github.actor }}
          GLYPHTOON_GITHUB_PAT: ${{ secrets.GLYPHTOON_GITHUB_PAT != '' && secrets.GLYPHTOON_GITHUB_PAT || github.token }}
        run: dotnet restore GlyphToon.Benchmark.slnx --nologo

      - name: Build
        run: dotnet build GlyphToon.Benchmark.slnx -c Release --no-restore --nologo

      - name: Create artifact directories
        run: mkdir -p artifacts artifacts/test-results

      - name: Test
        run: >
          dotnet test GlyphToon.Benchmark.slnx
          -c Release
          --no-build
          --nologo
          -m:1
          --logger "trx;LogFileName=test-results.trx"
          --results-directory artifacts/test-results

      - name: Run built-in benchmark scenarios
        run: >
          dotnet run --project GlyphToon.Benchmark/GlyphToon.Benchmark.csproj
          -c Release
          --no-build
          --
          --iterations 100
          > artifacts/benchmark-builtins.txt

      - name: Run sample input benchmark
        run: >
          dotnet run --project GlyphToon.Benchmark/GlyphToon.Benchmark.csproj
          -c Release
          --no-build
          --
          --iterations 100
          --input tmp/sample-input.json
          > artifacts/benchmark-sample-input.txt

      - name: Upload test and benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-ci-artifacts
          path: artifacts
